<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edge Command Panel Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Edge Command Panel</p>
        <h1>Custom URL mappings</h1>
        <p class="intro">Map a short input such as <code>mail</code> to a URL. Type it in the command panel and press Enter to open the page.</p>
      </header>

      <form id="mapping-form">
        <input id="mapping-id" type="hidden">
        <label>
          Input
          <input id="mapping-input" name="input" required maxlength="80" placeholder="mail" autocomplete="off">
        </label>
        <label>
          URL
          <input id="mapping-url" name="url" required placeholder="https://outlook.office.com" inputmode="url" autocomplete="url">
        </label>
        <div class="form-actions">
          <button id="save-button" type="submit">Add mapping</button>
          <button id="cancel-button" class="secondary" type="button" hidden>Cancel</button>
        </div>
        <p id="form-message" class="message" role="status"></p>
      </form>

      <section aria-labelledby="saved-title">
        <div class="section-heading">
          <h2 id="saved-title">Saved mappings</h2>
          <span id="mapping-count"></span>
        </div>
        <div id="mapping-list" class="mapping-list"></div>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
